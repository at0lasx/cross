name: Convert Clash Rules to QX

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 0 点自动更新
  workflow_dispatch:        # 支持手动触发
  push:
    branches: [ main ]

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Convert rules
        run: node convert.js

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "Auto convert $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
